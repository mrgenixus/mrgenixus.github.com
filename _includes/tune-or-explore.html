{% if include.oc | default: page.oc %}
  <div
    class="offcanvas offcanvas-start"
    tabindex="-1"
    id="{{ include.oc | default: page.oc }}">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="offcanvasExampleLabel">Mode Configuration</h5>
    <button
      type="button"
      class="btn-close"
      data-bs-dismiss="offcanvas"
      aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">
    <div id="mode">
      <input
        type="radio"
        class="btn-check"
        name="mode"
        autocomplete="off"
        id="tune-mode-option">
      <label class="btn" for="tune-mode-option">Tune</label>

      <input
        type="radio"
        class="btn-check"
        name="mode"
        autocomplete="off"
        id="explore-mode-option">
      <label class="btn" for="explore-mode-option">Explore</label>

      <input
        type="radio"
        class="btn-check"
        name="mode"
        autocomplete="off"
        id="filter-mode-option">
      <label class="btn" for="filter-mode-option">Filter</label>
    </div>
    <div id="filter-logic" class="mt-3">
      <input
        type="radio"
        class="btn-check"
        name="filter-logic"
        autocomplete="off"
        id="filter-logic-and-option">
      <label class="btn" for="filter-logic-and-option">AND</label>

      <input
        type="radio"
        class="btn-check"
        name="filter-logic"
        autocomplete="off"
        id="filter-logic-or-option">
      <label class="btn" for="filter-logic-or-option">OR</label>
    </div>
    <button
      type="button"
      class="btn btn-warning"
      id="reset">Reset</button>
  </div>
  <script lang="javascript" type="module">
    const container = document.querySelector('#mode');
    const buttons = Array.from(container.querySelectorAll('input[type=radio][name="mode"]'));
    const filterLogicContainer = document.querySelector('#filter-logic');
    const filterLogicButtons = Array.from(filterLogicContainer.querySelectorAll('input[type=radio][name="filter-logic"]'));
    export const state = {};
    const url = new URL(window.location.href);
    state.mode = url.searchParams.get('mode') ?? 'explore';
    state.filterLogic = url.searchParams.get('filter-logic') ?? 'and';
    const updateMode = (newMode) => {
      window.requestAnimationFrame(() => {
        state.mode = newMode
        const currentModeButton = buttons.find((el) => {
          return el.id === `${state.mode}-mode-option`
        });
        (currentModeButton ?? {}).checked=true;
        container.dataset['mode'] = state.mode;
      });
    }

    const updateFilterLogic = (newLogic) => {
      window.requestAnimationFrame(() => {
        state.filterLogic = newLogic;
        const currentFilterLogicButton = filterLogicButtons.find((el) => {
          return el.id === `filter-logic-${state.filterLogic}-option`
        });
        (currentFilterLogicButton ?? {}).checked = true;
        filterLogicContainer.dataset['filterLogic'] = state.filterLogic;
      });
    }

    buttons.forEach((button) => {
      button.addEventListener('change', (e) => {
        e.preventDefault();
        updateMode(button.id.replace('-mode-option', ''));
        return false;
      });
    });

    filterLogicButtons.forEach((button) => {
      button.addEventListener('change', (e) => {
        e.preventDefault();
        updateFilterLogic(button.id.replace('filter-logic-', '').replace('-option', ''));
        return false;
      });
    });

    updateMode(state.mode);
    updateFilterLogic(state.filterLogic);
  </script>
{% endif %}
